<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>生日快乐 🎁 专属惊喜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 全局手写可爱风格 */
            font-family: 'Comic Sans MS', 'Marker Felt', 'Segoe UI Emoji', '微软雅黑', cursive, sans-serif;
        }

        body {
            background: #fef7e8;
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            margin: 0;
            touch-action: pan-x pan-y; /* 保留触摸滚动体验但页面固定 */
        }

        /* 页面容器 */
        .page {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            pointer-events: none;
            padding: 24px;
            text-align: center;
            background-color: #fef7e8;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

            .page.active {
                opacity: 1;
                pointer-events: auto;
            }

        /* 入场动画 */
        .text-animate {
            opacity: 0;
            transform: translateY(24px);
            animation: fadeSlideUp 0.6s ease forwards;
        }

        @keyframes fadeSlideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 圆圈散落特效 */
        .circle-dot {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: circleScaleFade 2s ease-out forwards;
        }

        @keyframes circleScaleFade {
            0% {
                transform: scale(0);
                opacity: 0.9;
            }

            100% {
                transform: scale(12);
                opacity: 0;
            }
        }

        /* 笑脸小动画 */
        .smiley {
            display: inline-block;
            transform-origin: center center;
            animation: fallDown 0.6s ease forwards;
            color: #ff8c42;
        }

        @keyframes fallDown {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(12deg);
            }
        }

        /* 按钮样式 */
        .btn {
            padding: 14px 36px;
            border: none;
            border-radius: 48px;
            background: #ff8c42;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(255, 100, 50, 0.3);
            transition: transform 0.2s, background 0.2s;
            margin-top: 28px;
            letter-spacing: 2px;
        }

            .btn:active {
                transform: scale(0.96);
                background: #ff6e2c;
            }

        /* 页面1 主视觉 */
        #page1 h1 {
            font-size: clamp(1.6rem, 6vw, 2.8rem);
            font-weight: 600;
            margin-bottom: 20px;
            color: #2c3e4e;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }

        /* 页面2 小熊称呼 */
        #page2 h1 {
            font-size: clamp(2.8rem, 10vw, 5rem);
            font-weight: 500;
            background: linear-gradient(135deg, #ff9a3c, #ff5e7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
        }

        #page2 p {
            margin-top: 16px;
            color: #8b7a6b;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            font-style: italic;
        }

        /* 页面3 直白可爱 */
        #page3 h1 {
            font-size: clamp(1.3rem, 5.5vw, 2rem);
            line-height: 1.45;
            max-width: 90%;
            background: #ffe6d5;
            padding: 28px 18px;
            border-radius: 60px;
            color: #c25d2e;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }

        /* 页面4 生日大标题 */
        #page4 h1 {
            font-size: clamp(2.8rem, 12vw, 5.5rem);
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(120deg, #fd8a5e, #ff3b6f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* 第5页 (最终页) - 全新左移+防溢出布局 */
        #page5 {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
            position: relative;
        }

            /* 重要：文字框完全左对齐，防止手机右侧溢出 */
            #page5 .text-box {
                position: absolute;
                top: 70%; /* 垂直舒适区稍调 */
                left: 24px; /* 左边缘固定间距，整体左移核心 */
                right: auto;
                transform: none; /* 取消居中偏移 */
                width: auto;
                max-width: calc(100% - 48px); /* 右侧保证留白，绝不溢出 */
                background: rgba(132, 149, 169, 0.92);
                backdrop-filter: blur(3px);
                padding: 22px 28px;
                border-radius: 36px;
                box-shadow: 0 18px 32px rgba(0, 0, 0, 0.2);
                text-align: left; /* 内容左对齐，阅读更自然 */
                word-wrap: break-word;
                white-space: normal;
                overflow-wrap: break-word;
                border: 1px solid rgba(255,245,210,0.5);
                transition: all 0.2s;
            }

                #page5 .text-box p {
                    color: #fff9ef;
                    font-size: clamp(1.2rem, 5vw, 2rem);
                    line-height: 1.55;
                    font-weight: 500;
                    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
                    margin: 0;
                }

        /* 横屏模式适配 - 保持左移但微调位置 */
        @media (orientation: landscape) {
            #page5 .text-box {
                top: 62%;
                left: 32px;
                max-width: 65%;
                padding: 18px 26px;
            }

                #page5 .text-box p {
                    font-size: clamp(1rem, 3.5vw, 1.8rem);
                }
        }

        /* 针对大屏/平板温柔限制宽度，依然左侧对齐不溢出 */
        @media (min-width: 768px) {
            #page5 .text-box {
                max-width: 500px;
                left: 40px;
                top: 68%;
            }
        }

        /* 超宽显示器依然保持优雅左距 */
        @media (min-width: 1200px) {
            #page5 .text-box {
                left: 80px;
                max-width: 560px;
            }
        }

        /* 原有横屏媒体保持其他页面样式，不冲突 */
        @media (orientation: landscape) {
            #page5 .text-box {
                top: 60%;
            }
        }

        /* 小屏手机如 iPhone SE 确保边距安全 */
        @media (max-width: 400px) {
            #page5 .text-box {
                left: 16px;
                max-width: calc(100% - 32px);
                padding: 18px 20px;
                top: 72%;
            }
        }

        /* 辅助全局交互 */
        .text-box p {
            word-break: break-word;
        }

        /* 其他通用 */
        .lang-switch {
            margin-top: 20px;
            color: #b0a088;
            font-size: 0.85rem;
        }

        /* 避免意外滚动条 */
        ::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="bgm.mp3" type="audio/mpeg">
        您的浏览器不支持音频播放 🎵
    </audio>

    <div class="page active" id="page1">
        <h1 class="text-animate">✨ Ready for a surprise? ✨</h1>
        <button class="btn text-animate" onclick="goToPage(2); playMusic();">🎂 Yes, Open It! 🎁</button>
        <div class="lang-switch text-animate">💝 给你的小小仪式感 💝</div>
    </div>

    <div class="page" id="page2" onclick="goToPage(3)">
        <h1 class="text-animate">Hi <span>小熊🐻</span></h1>
        <p class="text-animate">✨ 今天是你特别的日子 ✨</p>
    </div>

    <div class="page" id="page3" onclick="goToPage(4)">
        <h1 class="text-animate">💬 我不太会说漂亮话，但心意都藏在这里啦～ 直接一点：你超重要！🎈</h1>
    </div>

    <div class="page" id="page4" onclick="goToPage(5)">
        <h1 class="text-animate">Happy Birthday <span class="smiley">🎂 :)</span></h1>
    </div>

    <div class="page" id="page5">
        <div class="text-box text-animate">
            <p>✨ 愿你的每一天都有小欢喜 ✨<br>🎬 还有看不完的电影和吃不完的爆米花 🍿💕</p>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const totalPages = 5;
        const bgMusic = document.getElementById('bgMusic');

        // 背景图片轮播列表 (可替换成自己图片)
        const bgImgList = [
            "1.jpg",
            "2.jpg",
            "3.jpg"
        ];
        let imgIndex = 0;

        // 用于管理圆圈动画的定时器 (防止多次生成导致性能问题)
        let circleInterval = null;

        // 创建小圆圈特效 (仅页面4活跃时调用，并确保只存在一个定时器)
        function createRandomCircle() {
            // 先清除之前的定时器，避免重复累积
            if (circleInterval) {
                clearInterval(circleInterval);
                circleInterval = null;
            }
            const page4 = document.getElementById('page4');
            // 移除页面上残留的旧圆圈 (可选，让效果清爽)
            const oldCircles = page4.querySelectorAll('.circle-dot');
            oldCircles.forEach(circle => circle.remove());

            const colors = ['#ff8c42', '#ff5e7c', '#ffc857', '#6ecf7b', '#b77eff', '#4d9de0'];
            circleInterval = setInterval(() => {
                // 只有page4处于活跃状态才生成圆圈 (避免后台页消耗)
                const activePage = document.querySelector('.page.active');
                if (!activePage || activePage.id !== 'page4') {
                    // 如果当前不是page4，不生成新圆圈，但保留定时器下次再检测也行，为了更优性能直接返回
                    return;
                }
                const circle = document.createElement('div');
                circle.className = 'circle-dot';
                let size = Math.random() * 28 + 10;
                circle.style.width = size + 'px';
                circle.style.height = size + 'px';
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                page4.appendChild(circle);
                // 动画结束后自动移除
                setTimeout(() => {
                    if (circle && circle.remove) circle.remove();
                }, 2000);
            }, 380);
        }

        // 停止圆圈特效 (离开页面4时调用，释放资源)
        function stopCircleEffect() {
            if (circleInterval) {
                clearInterval(circleInterval);
                circleInterval = null;
            }
            // 额外移除残存的所有圆圈节点
            const page4 = document.getElementById('page4');
            if (page4) {
                const circles = page4.querySelectorAll('.circle-dot');
                circles.forEach(c => c.remove());
            }
        }

        // 页面切换核心函数
        function goToPage(pageNum) {
            if (pageNum > totalPages) return;

            // 如果离开页面4，就清理圆圈特效，防止后台堆积
            if (currentPage === 4 && pageNum !== 4) {
                stopCircleEffect();
            }

            // 切换 active class
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const nextPage = document.getElementById(`page${pageNum}`);
            if (nextPage) nextPage.classList.add('active');
            currentPage = pageNum;

            // 重新触发当前页面内的 .text-animate 动画 (重置动画)
            const activePageElem = document.getElementById(`page${pageNum}`);
            if (activePageElem) {
                const animatedElements = activePageElem.querySelectorAll('.text-animate');
                animatedElements.forEach(el => {
                    el.style.animation = 'none';
                    // 强制重绘小技巧
                    void el.offsetHeight;
                    el.style.animation = null;
                });
            }

            // 特殊处理页面4: 启动圆圈绽放特效
            if (pageNum === 4) {
                createRandomCircle();
            }

            // 特殊处理页面5: 设置第一张背景图 (如果还没设置过背景则采用第一张)
            if (pageNum === 5) {
                const page5Div = document.getElementById('page5');
                // 避免重复设置相同背景导致闪动, 但初次无背景就设置默认
                if (!page5Div.style.backgroundImage || page5Div.style.backgroundImage === 'none') {
                    if (bgImgList.length > 0) {
                        page5Div.style.backgroundImage = `url(${bgImgList[0]})`;
                        imgIndex = 0;
                    } else {
                        // 如果没有任何背景图片，给个温暖底色
                        page5Div.style.backgroundColor = '#ffe0c4';
                    }
                }
                // 确保背景图片样式统一 (cover)
                page5Div.style.backgroundSize = 'cover';
                page5Div.style.backgroundPosition = 'center';
            }
        }

        // 播放背景音乐 (需要用户手势交互, 在第一页按钮触发)
        function playMusic() {
            if (bgMusic) {
                bgMusic.volume = 0.5;
                bgMusic.play().catch(e => {
                    console.log("音乐播放需用户交互, 已经点击开启~", e);
                    // 部分浏览器仍可能拦截, 但首次点击按钮会成功
                });
            }
        }

        // 最后一页 (page5) 点击切换背景图片 + 左移文字不影响任何点击交互，保留惊喜感
        document.getElementById('page5').addEventListener('click', (e) => {
            // 如果点击的文字框内部区域, 但也无伤大雅，仍然切换背景，让惊喜继续
            // 防止过于频繁快速切换产生性能问题，但是无碍
            if (bgImgList.length === 0) return;
            imgIndex = (imgIndex + 1) % bgImgList.length;
            const page5Div = document.getElementById('page5');
            const newImg = bgImgList[imgIndex];
            if (newImg) {
                page5Div.style.backgroundImage = `url(${newImg})`;
                // 微小的过渡效果: 更新时加个淡入淡出感
                page5Div.style.transition = 'background-image 0.35s ease-in-out';
            }
        });

        // 预加载背景图，让切换更平滑 (优雅处理)
        function preloadImages() {
            bgImgList.forEach(src => {
                const img = new Image();
                img.src = src;
            });
        }
        preloadImages();

        // 确保在页面加载完成后如果page5已经有文字框但背景未设置，补一个默认背景
        window.addEventListener('load', () => {
            const page5Init = document.getElementById('page5');
            if (page5Init && (!page5Init.style.backgroundImage || page5Init.style.backgroundImage === 'none')) {
                if (bgImgList.length > 0) {
                    page5Init.style.backgroundImage = `url(${bgImgList[0]})`;
                    page5Init.style.backgroundSize = 'cover';
                    page5Init.style.backgroundPosition = 'center';
                    imgIndex = 0;
                }
            }
      
            page5Init.style.backgroundSize = 'cover';
            page5Init.style.backgroundPosition = 'center';

     
        });

   
        window.addEventListener('beforeunload', () => {
            if (circleInterval) {
                clearInterval(circleInterval);
            }
        });

        console.log("🎉 生日惊喜已加载，最后一页文字已左移，手机不溢出 🎉");
    </script>
</body>
</html>
